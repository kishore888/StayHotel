eureka:
 client:
   register-with-eureka: true
   fetch-registry: true
   serviceUri:
    defaultZone: http://localhost:8761/eureka/
 instance: 
    hostname: localhost
server:
 port: 8880
spring:
 application:
  name: APIGATEWAY-OF-HTM  
 cloud: 
  gateway: 
    globalcors: 
      add-to-simple-url-handler-mapping: true 
      corsConfigurations: 
        '[/**]': 
          allowedOrigins: "http://localhost:4200" 
          allowedMethods: "*"
          allowedHeaders: "*" 
          allowCredentials: true
    httpclient:
        pool:
          type: fixed
          max-connections: 1000
          acquire-timeout: 7500
          max-idle-time: 90s
          max-life-time: 90s



       
    
       
       
 
  